<!DOCTYPE html>
<html>
<head>
    <title>Suggestions</title>
    <link rel="stylesheet" href="/css/suggestions.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Recommended For You</h1>
        <div class="header-right">
            <button onclick="window.location.href='/dashboard'">Dashboard</button>
            <button id="logoutButton">Log Out</button>
        </div>
    </div>

    <div class="section">
        <p id="ratingsSummary" class="ratings-summary"></p>
    </div>

    <div class="section" id="toRateSection">
        <h2>Rate These to Improve Recommendations</h2>
        <p class="section-hint">Titles from your watch history you haven't rated yet.</p>
        <div id="toRateList"></div>
    </div>

    <div class="section" id="recommendationsSection">
        <h2>Recommended For You</h2>
        <p class="section-hint">Based on ratings from users with similar taste.</p>
        <div id="recommendationsList"></div>
    </div>

</div>

<script src="/js/datamodel.js"></script>
<script src="/js/suggestions.js"></script>

</body>
</html>
