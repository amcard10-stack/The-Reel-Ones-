<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/title-detail-modal.css">
</head>
<body>

<div class="container">
    <!-- HEADER -->
  <div class="header">
    <div class="title-group">
        <img src="/logo.png" alt="Roll the Tapes" class="header-logo">
        <h2 class="page-title">Dashboard</h2>
    </div>
    <div class="header-right">
        <button id="logoutButton">Log Out</button>
    </div>
</div>
    <!-- FEATURE NAVIGATION -->
    <div class="feature-nav">
        <button onclick="window.location.href='/profile'">Profile</button>
        <button onclick="window.location.href='/ratings'">Ratings</button>
        <button onclick="window.location.href='/friends'" class="nav-btn-with-badge">Friends <span id="friendRequestBadge" class="friend-request-badge" aria-label="Pending friend requests"></span><span id="friendMessageBadge" class="friend-message-badge" aria-label="Unread messages"></span></button>
        <button onclick="window.location.href='/movies'">Movies</button>
        <button onclick="window.location.href='/shows'">Shows</button>
        <button onclick="window.location.href='/suggestions'">Suggestions</button>
    </div>
    <a href="/friends" id="friendActivityTeaser" class="friend-activity-teaser" style="display:none;">
        <span id="friendActivityTeaserText"></span>
    </a>
    <!-- WATCH HISTORY SECTION -->
    <div class="section">
        <h2>Watch History</h2>
        <input type="text" id="watchHistorySearch" placeholder="Search watch history..." class="section-search">
        <div class="add-section">
            <input type="text" id="watchHistoryTitle" placeholder="Search movies or shows to add..." class="tmdb-search-input">
            <select id="watchHistoryType">
                <option value="movie">Movie</option>
                <option value="show">Show</option>
            </select>
        </div>
        <div id="watchHistoryResults" class="tmdb-results-grid"></div>
        <div class="dashboard-list" id="watchHistory"></div>
    </div>
<!-- WATCH STATUS BOARD -->
<div class="section">
  <h2>My Statuses</h2>

  <div class="add-section" style="margin-bottom:12px;">
    <input id="statusTitle" type="text" placeholder="Search movies or shows to add..." class="tmdb-search-input">
    <select id="statusType">
        <option value="movie">Movie</option>
        <option value="show">Show</option>
    </select>
    <select id="statusValue">
        <option value="want_to_watch">want to watch</option>
        <option value="watching">watching</option>
        <option value="completed">completed</option>
    </select>
</div>
<div id="statusResults" class="tmdb-results-grid"></div>
<div class="status-grid">
    <div class="status-col" data-status-drop="want_to_watch">
        <h3>Want to Watch</h3>
        <div id="statusWant" class="status-list"></div>
    </div>
    <div class="status-col" data-status-drop="watching">
        <h3>Watching</h3>
        <div id="statusWatching" class="status-list"></div>
    </div>
    <div class="status-col" data-status-drop="completed">
        <h3>Completed</h3>
        <div id="statusCompleted" class="status-list"></div>
    </div>
</div>
</div>
<!-- END WATCH STATUS BOARD -->

    <!-- LISTS SECTION -->
    <div class="section">
        <h2>My Lists</h2>
        <input type="text" id="listsSearch" placeholder="Search lists..." class="section-search">
        <div class="quick-add">
            <input type="text" id="newListName" placeholder="List name (e.g. Favorites, Date Night, Horror)">
            <button id="createListBtn">Create List</button>
        </div>
        <div id="addToListForm" class="add-section" style="display:none;">
            <select id="listSelect" placeholder="Select a list"></select>
            <input type="text" id="listItemTitle" placeholder="Search movies or shows to add..." class="tmdb-search-input">
        </div>
        <div id="listItemResults" class="tmdb-results-grid"></div>
        <div class="dashboard-list" id="listsContainer"></div>
    </div>

</div>

<!-- Item detail popup -->
<div id="itemPopup" class="popup-overlay" style="display:none;">
  <div class="popup-content">
    <button class="popup-close" id="popupClose">&times;</button>
    <div class="popup-header">
      <div class="popup-poster-wrap">
        <img id="popupPoster" class="popup-poster" src="" alt="">
        <div id="popupPosterPlaceholder" class="popup-poster-placeholder"></div>
      </div>
      <div class="popup-info">
        <h3 id="popupTitle"></h3>
        <p id="popupMeta" class="popup-meta"></p>
        <p id="popupStatus" class="popup-status"></p>
      </div>
    </div>
    <div class="popup-body">
      <div class="popup-section">
        <label>Rating</label>
        <div class="star-rating" id="popupStars">
          <span data-rating="1">☆</span><span data-rating="2">☆</span><span data-rating="3">☆</span><span data-rating="4">☆</span><span data-rating="5">☆</span>
        </div>
      </div>
      <div class="popup-section">
        <label>Review</label>
        <textarea id="popupReview" rows="3" placeholder="Write a review..."></textarea>
      </div>
      <div class="popup-section" id="popupStatusSection">
        <label>Status</label>
        <select id="popupStatusSelect">
          <option value="watching">Watching</option>
          <option value="completed">Completed</option>
          <option value="want_to_watch">Want to Watch</option>
        </select>
      </div>
      <div class="popup-section" id="popupListsSection" style="display:none;">
        <label>In lists</label>
        <div id="popupListsContainer" class="popup-lists-btns"></div>
      </div>
    </div>
    <div class="popup-actions">
      <button id="popupDelete" class="popup-btn danger">Delete</button>
      <button id="popupSave" class="popup-btn primary">Save</button>
      <button id="popupCancel" class="popup-btn">Cancel</button>
    </div>
  </div>
</div>

<!-- Profile Prompt Popup -->
<div id="profilePrompt" class="popup-overlay" style="display:none;">
    <div class="popup-content" style="text-align:center; max-width:360px;">
        <h3 style="margin-bottom:12px;">Finish Your Profile 👤</h3>
        <p style="color:#D9DEE4; margin-bottom:24px;">Update your profile info so friends can recognize you!</p>
        <div class="popup-actions" style="justify-content:center;">
            <button id="profilePromptGoNow" class="popup-btn primary">Go Now</button>
            <button id="profilePromptLater" class="popup-btn">Maybe Later</button>
        </div>
    </div>
</div>

<script src="/js/datamodel.js"></script>
<script src="/js/title-detail-modal.js"></script>
<script src="/js/dashboard.js"></script>

</body>
</html>
