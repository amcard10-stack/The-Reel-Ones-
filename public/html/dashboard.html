<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>

<div class="container">
    <!-- HEADER -->
  <div class="header">
    <div class="title-group">
        <h1>Roll the Tapes</h1>

        <h2>Dashboard</h2>
    </div>

    <div class="header-right">
        <button id="refreshButton">Refresh</button>
        <button id="logoutButton">Log Out</button>
    </div>
</div>
    <!-- FEATURE NAVIGATION -->
    <div class="feature-nav">
        <button onclick="window.location.href='/profile'">Profile</button>
        <button onclick="window.location.href='/ratings'">Ratings</button>
        <button onclick="window.location.href='/friends'">Friends</button>
        <button onclick="window.location.href='/movies'">Movies</button>
        <button onclick="window.location.href='/shows'">Shows</button>
        <button onclick="window.location.href='/suggestions'">Suggestions</button>
    </div>
    <!-- WATCH HISTORY SECTION -->
    <div class="section">
        <h2>Watch History</h2>
        <input type="text" id="watchHistorySearch" placeholder="Search watch history..." class="section-search">
        <div class="quick-add">
            <input type="text" id="watchHistoryTitle" placeholder="Movie or show title">
            <select id="watchHistoryType">
                <option value="movie">Movie</option>
                <option value="show">Show</option>
            </select>
            <button id="addWatchHistoryBtn">Add</button>
        </div>
        <div class="dashboard-list" id="watchHistory"></div>
    </div>

<!-- WATCH STATUS BOARD -->
<div class="section">
  <h2>My Statuses</h2>

  <div class="status-grid">
    <div class="status-col">
      <h3>Watching</h3>
      <div id="statusWatching" class="status-list"></div>
    </div>

    <div class="status-col">
      <h3>Completed</h3>
      <div id="statusCompleted" class="status-list"></div>
    </div>

    <div class="status-col">
      <h3>Want to Watch</h3>
      <div id="statusWant" class="status-list"></div>
    </div>
  </div>

  <div class="quick-add" style="margin-top:12px;">
    <input id="statusTitle" type="text" placeholder="Movie or show title">
    <select id="statusType">
      <option value="movie">Movie</option>
      <option value="show">Show</option>
    </select>
    <select id="statusValue">
      <option value="watching">watching</option>
      <option value="completed">completed</option>
      <option value="want_to_watch">want to watch</option>
    </select>
    <button id="setStatusBtn">Set Status</button>
  </div>
</div>
<!-- END WATCH STATUS BOARD -->

    <!-- LISTS SECTION -->
    <div class="section">
        <h2>My Lists</h2>
        <input type="text" id="listsSearch" placeholder="Search lists..." class="section-search">
        <div class="quick-add">
            <input type="text" id="newListName" placeholder="List name (e.g. Watchlist)">
            <button id="createListBtn">Create List</button>
        </div>
        <div id="addToListForm" class="quick-add" style="display:none;">
            <select id="listSelect"></select>
            <input type="text" id="listItemTitle" placeholder="Add item to list">
            <button id="addToListBtn">Add</button>
        </div>
        <div class="dashboard-list" id="listsContainer"></div>
    </div>

</div>

<script src="/js/datamodel.js"></script>
<script src="/js/dashboard.js"></script>

</body>
</html>
