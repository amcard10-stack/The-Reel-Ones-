<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/profile.css">
</head>
<body>

    <div class="settings-container">
    <div class="header">
        <h1 class="page-title">My Profile</h1>
        <div class="header-right">
            <button class="nav-btn" onclick="window.location.href='/dashboard'">Dashboard</button>
            <button class="nav-btn" id="logoutButton">Log Out</button>
        </div>
    </div>

        <!-- PERSONAL INFO -->
        <h2 class="section-header">Personal Information</h2>
        <p class="subtitle">
            Manage your personal information below.
        </p>

 
        <div class="profile-picture-section">
            <img id="profilePic"
                src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='40' r='25' fill='%23ddd'/%3E%3Cellipse cx='50' cy='95' rx='35' ry='25' fill='%23ddd'/%3E%3C/svg%3E"
                class="profile-img"
                alt="Profile">

            <label class="upload-btn">
                Change Picture
                <input type="file"
                    id="profilePicInput"
                    accept="image/*"
                    hidden>
            </label>
        </div>

         <!-- BIO SECTION -->
        <div class="bio-card">

        <div class="input-group">
            <label for="bioInput">Bio</label>
            <textarea 
               id="bioInput"
                placeholder="Tell others about your movie and show tastes..."
            ></textarea>
        </div>

        </div>

        <!-- PERSONAL INFO CARD -->
        <div class="card">

            <div class="input-group">
                <label for="firstNameInput">First Name</label>
                <input type="text" id="firstNameInput">     
            </div>

            <div class="input-group">
                <label for="lastNameInput">Last Name</label>
                <input type="text" id="lastNameInput">
            </div>

            <div class="input-group">
                <label for="emailInput">Email</label>
                <input type="email" id="emailInput">
            </div>

        </div>

        <hr class="divider">

        <!-- PASSWORD -->
        <h2 class="section-header">Password</h2>

        <button id="changePasswordBtn" class="outline-btn">
            Change Password
        </button>

        <div id="passwordSection" class="password-section hidden">

            <div class="input-group">
                <label for="newPasswordInput">New Password</label>
                <input type="password" id="newPasswordInput">
            </div>

            <div class="input-group">
                <label for="confirmPasswordInput">Confirm New Password</label>
                <input type="password" id="confirmPasswordInput">   
            </div>

        </div>

        <!-- SAVE BUTTON -->
        <div class="save-container">
            <button id="saveChangesBtn" class="primary-btn">
                Save Changes
            </button>
        </div>

    </div>

    <script src="/js/datamodel.js"></script>
    <script src="/js/profile.js"></script>

</body>
</html>
