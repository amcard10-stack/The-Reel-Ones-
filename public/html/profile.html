<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/profile.css">
</head>
<body>

    <!-- TOP RIGHT NAV -->
    <div class="top-nav">
        <button class="nav-btn" onclick="window.location.href='/dashboard'">
            Dashboard
        </button>

        <button class="nav-btn" id="logoutButton">
            Log Out
        </button>
    </div>

    <div class="settings-container">

        <!-- PAGE TITLE -->
        <h1 class="page-title">Profile</h1>

        <!-- PERSONAL INFO -->
        <h2 class="section-header">Personal Information</h2>
        <p class="subtitle">
            Manage your personal information below.
        </p>

 
        <div class="profile-picture-section">
            <img id="profilePic"
                src="/images/default.png"
                class="profile-img"
                alt="">

            <label class="upload-btn">
                Change Picture
                <input type="file"
                    id="profilePicInput"
                    accept="image/*"
                    hidden>
            </label>
        </div>

        <!-- PERSONAL INFO CARD -->
        <div class="card">

            <div class="input-group">
                <label>First Name</label>
                <input type="text" id="firstNameInput">
            </div>

            <div class="input-group">
                <label>Last Name</label>
                <input type="text" id="lastNameInput">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="emailInput">
            </div>

        </div>

        <hr class="divider">

        <!-- PASSWORD -->
        <h2 class="section-header">Password</h2>

        <button id="changePasswordBtn" class="outline-btn">
            Change Password
        </button>

        <div id="passwordSection" class="password-section hidden">

            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="newPasswordInput">
            </div>

            <div class="input-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPasswordInput">
            </div>

        </div>

        <!-- SAVE BUTTON -->
        <div class="save-container">
            <button id="saveChangesBtn" class="primary-btn">
                Save Changes
            </button>
        </div>

    </div>

    <script src="/js/datamodel.js"></script>
    <script src="/js/profile.js"></script>

</body>
</html>
