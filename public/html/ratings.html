<!DOCTYPE html>
<html>
<head>
    <title>Ratings</title>
    <link rel="stylesheet" href="../css/ratings.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>My Ratings</h1>
        <div class="header-right">
            <button onclick="window.location.href='/dashboard'">Dashboard</button>
            <button id="logoutButton">Log Out</button>
        </div>
    </div>

    <div class="section">
        <h2>Rate a Movie/Show</h2>

        <input type="text" id="ratingTitle" placeholder="Title Name">
        <select id="ratingSelect">
            <option value="">Select Rating</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>
        <textarea id="ratingReview" placeholder="Write your review..."></textarea>
        <button class="primary" id="submitRatingBtn">Submit Rating</button>
        <p id="ratingMessage"></p>
    </div>

    <div class="section">
        <h2>My Previous Ratings</h2>
        <div class="rating-list" id="ratingList"></div>
    </div>

</div>

<script src="/js/datamodel.js"></script>
<script src="/js/ratings.js"></script>

</body>
</html>
