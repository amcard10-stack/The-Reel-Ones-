<!DOCTYPE html>
<html>
<head>
    <title>Ratings</title>
    <link rel="stylesheet" href="/css/ratings.css">
    <link rel="stylesheet" href="/css/title-detail-modal.css">
</head>
<body>

<div class="container">

    <div class="header">
    <h1>My Ratings</h1>
    <div class="header-right">
        <button onclick="window.location.href='/dashboard'">Dashboard</button>
        <button id="logoutButton">Log Out</button>
    </div>
    </div>

    <div class="section">
        <h2>Rate a Movie or Show</h2>
        <p class="scale-legend">Use our standardized 1–5 scale to rate titles. Your ratings help improve your recommendations.</p>

        <div class="form-row">
            <input type="text" id="ratingTitle" placeholder="Search movies or shows..." class="tmdb-search-input">
            <select id="ratingType">
                <option value="movie">Movie</option>
                <option value="show">TV Show</option>
            </select>
        </div>
        <div id="ratingSearchResults" class="tmdb-results-grid"></div>

        <div class="rating-scale">
            <label>Your rating:</label>
            <div class="star-rating" id="starRating">
                <span class="star" data-value="1" title="Poor">★</span>
                <span class="star" data-value="2" title="Fair">★</span>
                <span class="star" data-value="3" title="Good">★</span>
                <span class="star" data-value="4" title="Very Good">★</span>
                <span class="star" data-value="5" title="Excellent">★</span>
            </div>
            <span class="scale-label" id="scaleLabel">Select a rating</span>
        </div>

        <textarea id="ratingReview" placeholder="Write your review (optional)..."></textarea>
        <button class="primary" id="submitRatingBtn">Submit Rating</button>
        <p id="ratingMessage"></p>
    </div>

    <div class="section">
        <h2>My Previous Ratings</h2>
        <div class="rating-list" id="ratingList"></div>
    </div>

</div>

<script src="/js/datamodel.js"></script>
<script src="/js/title-detail-modal.js"></script>
<script src="/js/ratings.js"></script>

</body>
</html>
