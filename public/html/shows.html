<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shows</title>
    <link rel="stylesheet" href="/css/shows.css">
    <link rel="stylesheet" href="/css/title-detail-modal.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Shows</h1>
        <div class="header-right">
            <input type="text" id="showSearch" class="page-search" placeholder="Search shows...">
            <button id="showSearchBtn">Search</button>
            <button onclick="window.location.href='/dashboard'">Dashboard</button>
            <button id="logoutButton">Log Out</button>
        </div>
    </div>

    <div class="genre-tabs">
        <button class="genre-tab active" data-genre="all">All Shows</button>
        <button class="genre-tab" data-genre="trending">Trending</button>
        <button class="genre-tab" data-genre="10759">Action</button>
        <button class="genre-tab" data-genre="35">Comedy</button>
        <button class="genre-tab" data-genre="9648">Horror</button>
    </div>

    <div class="top-section">
        <div class="filter-panel">
            <h4>Filter by Subscription</h4>

            <label><input type="checkbox" value="netflix" class="subscription-filter"> Netflix</label>
            <label><input type="checkbox" value="hulu" class="subscription-filter"> Hulu</label>
            <label><input type="checkbox" value="disney" class="subscription-filter"> Disney+</label>
            <label><input type="checkbox" value="max" class="subscription-filter"> HBO Max</label>
            <label><input type="checkbox" value="prime" class="subscription-filter"> Amazon Prime</label>

            <div class="filter-buttons">
                <button id="clearFilterBtn">Clear</button>
                <button id="saveFilterBtn">Save</button>
            </div>
        </div>


    <div class="top-content">
            <h3 class="row-title" id="showsSectionTitle">All Shows</h3>

<div class="shows-grid" id="showsRow"></div>
        </div>
    </div>

            <div class="load-more-wrap">
                <button id="loadMoreBtn">Load More</button>
            </div>
        </div>

<script src="/js/datamodel.js"></script>
<script src="/js/title-detail-modal.js"></script>
<script src="/js/shows.js"></script>

</body>
</html>
